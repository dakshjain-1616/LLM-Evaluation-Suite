# LLM Evaluation Suite Configuration

openrouter:
  base_url: "https://openrouter.ai/api/v1"
  api_key: "${OPENROUTER_API_KEY}"
  timeout: 90
  max_retries: 3
  retry_delay: 2.0

# Claude Opus 4.7 vs GPT-5.4
models:
  - id: "anthropic/claude-opus-4.7"
    name: "Claude Opus 4.7"
  - id: "openai/gpt-5.4"
    name: "GPT-5.4"

benchmarks:
  enabled:
    # Math & Formal Reasoning
    - math500
    - aime
    - frontier_math
    - math_vista
    # Code Generation & Debugging
    - bigcodebench
    - swe_bench_pro
    - livecodebench
    - humaneval_plus
    # Long-Context Understanding
    - helmet_ruler
    - zeroscrolls
    - infinitebench
    - frames
    # Instruction Following
    - ifeval
    - wildbench
    # Knowledge & QA
    - simpleqa
    - medqa
    - legalbench
    # RAG & Grounded Generation
    - mirage
    # Safety & Alignment
    - strong_reject
    - harmbench
    - truthfulqa
    # Multimodal
    - docvqa
    - video_mme
    # Agent & Tool Use
    - tau_bench
    - gaia
    - web_arena
  sample_size: 20
  max_workers: 8

output:
  reports_dir: "reports"
  logs_dir: "logs"
  save_raw_responses: true
  generate_graphs: true

evaluation:
  temperature: 0.7
  max_tokens: 2048
  top_p: 0.9
